esphome:
  name: alarmclock
  friendly_name: Alarm Clock
  platformio_options:
    board_build.flash_mode: dio
  on_boot:
    priority: -100
    then:
      # Enable the speaker amplifier via the STC8H1K28 microcontroller at 0x30
      # Command 248 = turn on speaker amp (per Elecrow's Arduino example)
      - lambda: |-
          uint8_t cmd = 248;
          auto err = id(i2c_bus).write(0x30, &cmd, 1);
          if (err == esphome::i2c::ERROR_OK) {
            ESP_LOGW("speaker_init", "Speaker amplifier enabled (cmd 248 to 0x30)");
          } else {
            ESP_LOGE("speaker_init", "Failed to enable speaker amplifier!");
          }

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"
      CONFIG_ESP32S3_SPIRAM_SUPPORT: "y"
      CONFIG_SPIRAM_MODE_OCT: "y"
      CONFIG_SPIRAM_SPEED_80M: "y"

psram:
  mode: octal
  speed: 80MHz

external_components:
  - source:
      type: local
      path: components

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "AlarmClock Fallback"
    password: !secret wifi_fallback_password

api:
  encryption:
    key: !secret encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

logger:
  level: VERBOSE
  hardware_uart: UART0
  logs:
    i2c.idf: WARN
    lvgl: WARN
    touchscreen: WARN
    gt911.touchscreen: WARN

# --- Volume tracking ---
globals:
  - id: speaker_volume
    type: float
    initial_value: "1.0"

# --- I2C bus (shared: touch controller + BH1750) ---
i2c:
  id: i2c_bus
  sda: GPIO15
  scl: GPIO16
  scan: true

# --- Time source from Home Assistant (with SNTP fallback) ---
time:
  - platform: homeassistant
    id: ha_time
    timezone: America/Chicago
  - platform: sntp
    id: sntp_time
    timezone: America/Chicago

# --- Display: rpi_dpi_rgb 800x480 ---
display:
  - platform: rpi_dpi_rgb
    id: main_display
    auto_clear_enabled: false
    color_order: RGB
    pclk_frequency: 14MHz
    dimensions:
      width: 800
      height: 480
    de_pin: GPIO42
    vsync_pin: GPIO41
    hsync_pin: GPIO40
    pclk_pin: GPIO39
    # Pin mapping verified against Elecrow CrowPanel Advance 4.3" official repo:
    # https://github.com/Elecrow-RD/CrowPanel-Advance-4.3-HMI-ESP32-S3-AI-Powered-IPS-Touch-Screen-800x480
    data_pins:
      red:
        - GPIO7    # R0
        - GPIO17   # R1
        - GPIO18   # R2
        - GPIO3    # R3
        - GPIO46   # R4
      green:
        - GPIO9    # G0
        - GPIO10   # G1
        - GPIO11   # G2
        - GPIO12   # G3
        - GPIO13   # G4
        - GPIO14   # G5
      blue:
        - GPIO21   # B0
        - GPIO47   # B1
        - GPIO48   # B2
        - GPIO45   # B3
        - GPIO38   # B4
    hsync_front_porch: 8
    hsync_pulse_width: 4
    hsync_back_porch: 43
    vsync_front_porch: 8
    vsync_pulse_width: 4
    vsync_back_porch: 12

# --- Touchscreen: GT911 ---
touchscreen:
  - platform: gt911
    id: touch
    display: main_display

# --- LVGL UI skeleton ---
lvgl:
  displays:
    - main_display
  touchscreens:
    - touch
  pages:
    - id: clock_page
      bg_color: 0x000000
      widgets:
        - label:
            align: CENTER
            y: -60
            text: "--:--"
            id: clock_label
            text_font: montserrat_48
            text_color: 0xFFFFFF
        - label:
            align: CENTER
            y: -10
            text: "ready"
            id: debug_label
            text_color: 0xFFFF00
        - button:
            align: CENTER
            y: 20
            x: -80
            width: 120
            height: 50
            on_click:
              then:
                - logger.log:
                    level: WARN
                    format: "PLAY pressed - starting RTTTL, speaker state: %d, volume: %.2f"
                    args: ['(int)id(alarm_speaker).is_running()', 'id(speaker_volume)']
                - lvgl.label.update:
                    id: debug_label
                    text: "playing..."
                - rtttl.play:
                    rtttl: "Nokia:d=4,o=5,b=225:8e6,8d6,f#,g#,8c#6,8b,d,e,8b,8a,c#,e,2a"
                - lvgl.label.update:
                    id: debug_label
                    text: !lambda |-
                      if (id(alarm_rtttl).is_playing()) {
                        return std::string("rtttl: playing");
                      }
                      return std::string("rtttl: NOT playing!");
            widgets:
              - label:
                  align: CENTER
                  text: "Play"
                  text_color: 0xFFFFFF
        - button:
            align: CENTER
            y: 20
            x: 80
            width: 120
            height: 50
            on_click:
              then:
                - logger.log:
                    level: WARN
                    format: "STOP pressed - is_playing: %d"
                    args: ['id(alarm_rtttl).is_playing()']
                - rtttl.stop:
                    id: alarm_rtttl
                - lvgl.label.update:
                    id: debug_label
                    text: "stopped"
            widgets:
              - label:
                  align: CENTER
                  text: "Stop"
                  text_color: 0xFFFFFF
        - button:
            align: CENTER
            y: 90
            x: -80
            width: 120
            height: 50
            on_click:
              then:
                - lambda: |-
                    id(speaker_volume) = std::min(1.0f, id(speaker_volume) + 0.1f);
                - speaker.volume_set:
                    id: alarm_speaker
                    volume: !lambda 'return id(speaker_volume);'
                - lvgl.label.update:
                    id: volume_label
                    text: !lambda |-
                      char buf[8];
                      snprintf(buf, sizeof(buf), "%d%%", (int)(id(speaker_volume) * 100));
                      return std::string(buf);
            widgets:
              - label:
                  align: CENTER
                  text: "Vol +"
                  text_color: 0xFFFFFF
        - label:
            align: CENTER
            y: 90
            text: "100%"
            id: volume_label
            text_color: 0xFFFFFF
        - button:
            align: CENTER
            y: 90
            x: 80
            width: 120
            height: 50
            on_click:
              then:
                - lambda: |-
                    id(speaker_volume) = std::max(0.0f, id(speaker_volume) - 0.1f);
                - speaker.volume_set:
                    id: alarm_speaker
                    volume: !lambda 'return id(speaker_volume);'
                - lvgl.label.update:
                    id: volume_label
                    text: !lambda |-
                      char buf[8];
                      snprintf(buf, sizeof(buf), "%d%%", (int)(id(speaker_volume) * 100));
                      return std::string(buf);
            widgets:
              - label:
                  align: CENTER
                  text: "Vol -"
                  text_color: 0xFFFFFF

# --- Update clock display every second ---
interval:
  - interval: 1s
    then:
      - lvgl.label.update:
          id: clock_label
          text: !lambda |-
            auto time = id(ha_time).now();
            if (!time.is_valid()) {
              time = id(sntp_time).now();
            }
            if (!time.is_valid()) {
              return std::string("--:--");
            }
            char buf[6];
            snprintf(buf, sizeof(buf), "%02d:%02d", time.hour, time.minute);
            return std::string(buf);

# --- Alarm clock custom component (I2C backlight controller) ---
alarmclock:
  address: 0x30

# --- I2S audio output (MAX98357A) ---
i2s_audio:
  i2s_lrclk_pin: GPIO6
  i2s_bclk_pin: GPIO5

speaker:
  - platform: i2s_audio
    id: alarm_speaker
    dac_type: external
    i2s_dout_pin: GPIO4
    channel: mono
    timeout: never
    sample_rate: 16000
    use_apll: true

# --- RTTTL tone generator (for speaker test / alarm sound) ---
rtttl:
  speaker: alarm_speaker
  id: alarm_rtttl
  gain: 80%
  on_finished_playback:
    - logger.log:
        level: WARN
        format: "RTTTL playback finished"
    - lvgl.label.update:
        id: debug_label
        text: "finished"

# --- Light sensor ---
# BH1750 I²C light sensor (optional, connect to I2C bus)
