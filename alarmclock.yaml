esphome:
  name: alarmclock
  friendly_name: Alarm Clock
  project:
    name: aclight.alarmclock
    version: "1.0.0"
  platformio_options:
    board_build.flash_mode: dio
  on_boot:
    priority: -100
    then:
      # Enable the speaker amplifier via the STC8H1K28 microcontroller at 0x30
      # Command 248 = turn on speaker amp (per Elecrow's Arduino example)
      - lambda: |-
          uint8_t cmd = 248;
          auto err = id(i2c_bus).write(0x30, &cmd, 1);
          if (err == esphome::i2c::ERROR_OK) {
            ESP_LOGW("speaker_init", "Speaker amplifier enabled (cmd 248 to 0x30)");
          } else {
            ESP_LOGE("speaker_init", "Failed to enable speaker amplifier!");
          }

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"
      CONFIG_ESP32S3_SPIRAM_SUPPORT: "y"
      CONFIG_SPIRAM_MODE_OCT: "y"
      CONFIG_SPIRAM_SPEED_80M: "y"

psram:
  mode: octal
  speed: 80MHz

external_components:
  - source:
      type: git
      url: https://github.com/aclight/esphome-alarmclock.git
      ref: main
      path: components
    components: [alarmclock]
    refresh: 1d

dashboard_import:
  package_import_url: github://aclight/esphome-alarmclock/alarmclock.yaml@main
  import_full_config: true

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "AlarmClock Fallback"
    password: !secret wifi_fallback_password

api:
  encryption:
    key: !secret encryption_key
  homeassistant_services: true

ota:
  - platform: esphome
    password: !secret ota_password

logger:
  level: VERBOSE
  hardware_uart: UART0
  logs:
    i2c.idf: WARN
    lvgl: WARN
    touchscreen: WARN
    gt911.touchscreen: WARN

# --- Volume/brightness now managed by the C++ component ---
# (globals removed — state lives in AlarmClockComponent)

# --- I2C bus (shared: touch controller + BH1750) ---
i2c:
  id: i2c_bus
  sda: GPIO15
  scl: GPIO16
  scan: true

# --- Time source from Home Assistant (with SNTP fallback) ---
# Timezone is auto-detected from the build machine. Override here if needed,
# e.g. timezone: America/Los_Angeles
time:
  - platform: homeassistant
    id: ha_time
  - platform: sntp
    id: sntp_time

# --- Display: mipi_rgb 800x480 ---
display:
  - platform: mipi_rgb
    model: RPI
    id: main_display
    auto_clear_enabled: false
    color_order: RGB
    pclk_frequency: 14MHz
    dimensions:
      width: 800
      height: 480
    de_pin: GPIO42
    vsync_pin: GPIO41
    hsync_pin: GPIO40
    pclk_pin: GPIO39
    # Pin mapping verified against Elecrow CrowPanel Advance 4.3" official repo:
    # https://github.com/Elecrow-RD/CrowPanel-Advance-4.3-HMI-ESP32-S3-AI-Powered-IPS-Touch-Screen-800x480
    data_pins:
      red:
        - GPIO7    # R0
        - GPIO17   # R1
        - GPIO18   # R2
        - GPIO3    # R3
        - GPIO46   # R4
      green:
        - GPIO9    # G0
        - GPIO10   # G1
        - GPIO11   # G2
        - GPIO12   # G3
        - GPIO13   # G4
        - GPIO14   # G5
      blue:
        - GPIO21   # B0
        - GPIO47   # B1
        - GPIO48   # B2
        - GPIO45   # B3
        - GPIO38   # B4
    hsync_front_porch: 8
    hsync_pulse_width: 4
    hsync_back_porch: 43
    vsync_front_porch: 8
    vsync_pulse_width: 4
    vsync_back_porch: 12

# --- Touchscreen: GT911 ---
touchscreen:
  - platform: gt911
    id: touch
    display: main_display

# --- LVGL UI (minimal — all UI built in C++ component) ---
# The boot_page exists solely to force ESPHome to compile in the LVGL fonts
# and widgets used by our C++ UI code.  The C++ ui_init() replaces this page.
lvgl:
  displays:
    - main_display
  touchscreens:
    - touch
  pages:
    - id: boot_page
      widgets:
        - label:
            text_font: montserrat_48
            text: ""
        - label:
            text_font: montserrat_40
            text: ""
        - label:
            text_font: montserrat_28
            text: ""
        - label:
            text_font: montserrat_24
            text: ""
        - label:
            text_font: montserrat_20
            text: ""
        - label:
            text_font: montserrat_18
            text: ""
        - label:
            text_font: montserrat_16
            text: ""
        - label:
            text_font: montserrat_14
            text: ""
        - switch:
            hidden: true
        - button:
            hidden: true
        - slider:
            hidden: true
        - roller:
            hidden: true
            options: "1"
        - textarea:
            hidden: true
        - keyboard:
            hidden: true
        - obj:
            hidden: true
            layout:
              type: flex
            widgets:
              - label:
                  text: ""

# --- Update clock display every second, check alarms on minute change ---
interval:
  - interval: 1s
    then:
      - lambda: |-
          auto time = id(ha_time).now();
          if (!time.is_valid()) {
            time = id(sntp_time).now();
          }
          if (time.is_valid()) {
            // ESPTime::day_of_week is 1-based (1=Sun..7=Sat); convert to
            // 0-based (0=Sun..6=Sat) used by alarm_time.h.
            uint8_t dow = static_cast<uint8_t>(time.day_of_week - 1);
            alarmclock::ui_update_clock(time.hour, time.minute,
                                       id(alarm_clock_component).time_format_24h());
            alarmclock::ui_update_date(time.month, time.day_of_month, dow);
            // Check alarms on every tick — the C++ side deduplicates per minute.
            id(alarm_clock_component).check_alarms_(
                time.hour, time.minute, dow);
          }

          // Keep HA template numbers in sync with on-device slider changes.
          float volume_percent = id(alarm_clock_component).volume() * 100.0f;
          float brightness_percent = id(alarm_clock_component).brightness() * 100.0f;
          static float last_volume_percent = -1.0f;
          static float last_brightness_percent = -1.0f;

          if (fabsf(volume_percent - last_volume_percent) >= 0.5f) {
            id(num_volume).publish_state(volume_percent);
            last_volume_percent = volume_percent;
          }

          if (fabsf(brightness_percent - last_brightness_percent) >= 0.5f) {
            id(num_brightness).publish_state(brightness_percent);
            last_brightness_percent = brightness_percent;
          }

# --- Alarm clock custom component (I2C backlight controller + alarm logic) ---
alarmclock:
  id: alarm_clock_component
  address: 0x30
  rtttl_id: alarm_rtttl

# --- I2S audio output (MAX98357A) ---
i2s_audio:
  i2s_lrclk_pin: GPIO6
  i2s_bclk_pin: GPIO5

speaker:
  - platform: i2s_audio
    id: alarm_speaker
    dac_type: external
    i2s_dout_pin: GPIO4
    channel: mono
    timeout: never
    sample_rate: 16000
    use_apll: true

# --- RTTTL tone generator (for alarm sound) ---
rtttl:
  speaker: alarm_speaker
  id: alarm_rtttl
  gain: 50%
  on_finished_playback:
    - lambda: 'id(alarm_clock_component).on_rtttl_finished();'

# --- Light sensor ---
# BH1750 I²C light sensor. Feeds brightness data to the alarm clock component.
sensor:
  - platform: bh1750
    name: "Ambient Light"
    id: ambient_light
    address: 0x23
    update_interval: 5s
    on_value:
      then:
        - lambda: |-
            float sf = alarmclock::lux_to_sensor_factor(x, 10.0f, 500.0f);
            id(alarm_clock_component).set_sensor_factor(sf);

# ---------------------------------------------------------------------------
# Home Assistant control entities.
# These let you control the alarm from HA automations, dashboards, or
# external buttons (e.g., bedside button to dismiss alarm + trigger scenes).
# ---------------------------------------------------------------------------

# --- Buttons: Dismiss / Snooze from HA ---
button:
  - platform: template
    name: "Dismiss Alarm"
    id: btn_dismiss
    icon: "mdi:alarm-off"
    on_press:
      - lambda: 'id(alarm_clock_component).dismiss_alarm();'

  - platform: template
    name: "Snooze Alarm"
    id: btn_snooze
    icon: "mdi:alarm-snooze"
    on_press:
      - lambda: 'id(alarm_clock_component).snooze_alarm();'

# --- Number: Volume / Brightness from HA ---
number:
  - platform: template
    name: "Alarm Volume"
    id: num_volume
    icon: "mdi:volume-high"
    min_value: 0
    max_value: 100
    step: 5
    unit_of_measurement: "%"
    optimistic: true
    set_action:
      - lambda: 'id(alarm_clock_component).set_volume(x / 100.0f);'

  - platform: template
    name: "Display Brightness"
    id: num_brightness
    icon: "mdi:brightness-6"
    min_value: 0
    max_value: 100
    step: 5
    unit_of_measurement: "%"
    optimistic: true
    set_action:
      - lambda: 'id(alarm_clock_component).set_brightness(x / 100.0f);'

# --- Text Sensor: Alarm state (idle/firing/snoozed) ---
text_sensor:
  - platform: template
    name: "Alarm State"
    id: alarm_state_sensor
    icon: "mdi:alarm"
    update_interval: 1s
    lambda: |-
      auto state = id(alarm_clock_component).alarm_state();
      switch (state) {
        case alarmclock::AlarmState::kFiring:
          return std::string("firing");
        case alarmclock::AlarmState::kSnoozed:
          return std::string("snoozed");
        default:
          return std::string("idle");
      }

# --- Binary Sensor: Is alarm currently firing? ---
binary_sensor:
  - platform: template
    name: "Alarm Firing"
    id: alarm_firing_sensor
    icon: "mdi:alarm-light"
    lambda: 'return id(alarm_clock_component).is_firing();'
