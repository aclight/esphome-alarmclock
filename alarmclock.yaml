esphome:
  name: alarmclock
  friendly_name: Alarm Clock
  platformio_options:
    board_build.flash_mode: dio

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"
      CONFIG_ESP32S3_SPIRAM_SUPPORT: "y"
      CONFIG_SPIRAM_MODE_OCT: "y"
      CONFIG_SPIRAM_SPEED_80M: "y"

psram:
  mode: octal
  speed: 80MHz

external_components:
  - source:
      type: local
      path: components

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "AlarmClock Fallback"
    password: !secret wifi_fallback_password

api:
  encryption:
    key: !secret encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

logger:
  level: DEBUG

# --- I2C bus (shared: touch controller + BH1750) ---
i2c:
  sda: GPIO15
  scl: GPIO16
  scan: true

# --- Time source from Home Assistant (with SNTP fallback) ---
time:
  - platform: homeassistant
    id: ha_time
    timezone: America/Chicago
  - platform: sntp
    id: sntp_time
    timezone: America/Chicago

# --- Display: rpi_dpi_rgb 800x480 ---
display:
  - platform: rpi_dpi_rgb
    id: main_display
    auto_clear_enabled: false
    color_order: RGB
    pclk_frequency: 14MHz
    dimensions:
      width: 800
      height: 480
    de_pin: GPIO42
    vsync_pin: GPIO41
    hsync_pin: GPIO40
    pclk_pin: GPIO39
    # Pin mapping verified against Elecrow CrowPanel Advance 4.3" official repo:
    # https://github.com/Elecrow-RD/CrowPanel-Advance-4.3-HMI-ESP32-S3-AI-Powered-IPS-Touch-Screen-800x480
    data_pins:
      red:
        - GPIO7    # R0
        - GPIO17   # R1
        - GPIO18   # R2
        - GPIO3    # R3
        - GPIO46   # R4
      green:
        - GPIO9    # G0
        - GPIO10   # G1
        - GPIO11   # G2
        - GPIO12   # G3
        - GPIO13   # G4
        - GPIO14   # G5
      blue:
        - GPIO21   # B0
        - GPIO47   # B1
        - GPIO48   # B2
        - GPIO45   # B3
        - GPIO38   # B4
    hsync_front_porch: 8
    hsync_pulse_width: 4
    hsync_back_porch: 43
    vsync_front_porch: 8
    vsync_pulse_width: 4
    vsync_back_porch: 12

# --- Touchscreen: GT911 ---
touchscreen:
  - platform: gt911
    id: touch
    display: main_display

# --- LVGL UI skeleton ---
lvgl:
  displays:
    - main_display
  touchscreens:
    - touch
  pages:
    - id: clock_page
      bg_color: 0x000000
      widgets:
        - label:
            align: CENTER
            text: "--:--"
            id: clock_label
            text_font: montserrat_48
            text_color: 0xFFFFFF

# --- Update clock display every second ---
interval:
  - interval: 1s
    then:
      - lvgl.label.update:
          id: clock_label
          text: !lambda |-
            auto time = id(ha_time).now();
            if (!time.is_valid()) {
              time = id(sntp_time).now();
            }
            if (!time.is_valid()) {
              return std::string("--:--");
            }
            char buf[6];
            snprintf(buf, sizeof(buf), "%02d:%02d", time.hour, time.minute);
            return std::string(buf);

# --- Alarm clock custom component (I2C backlight controller) ---
alarmclock:
  address: 0x30

# --- I2S audio output (MAX98357A) ---
i2s_audio:
  i2s_lrclk_pin: GPIO6
  i2s_bclk_pin: GPIO5

speaker:
  - platform: i2s_audio
    id: alarm_speaker
    dac_type: external
    i2s_dout_pin: GPIO4

# --- Light sensor ---
# BH1750 I²C light sensor (optional, connect to I2C bus)
# sensor:
