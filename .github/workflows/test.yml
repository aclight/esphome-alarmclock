name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  host-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compile tests
        run: >
          g++ -std=c++17 -Wall -Wextra -Werror -DUNIT_TEST
          -I .
          tests/test_alarm.cpp
          -o run_tests

      - name: Run tests
        run: ./run_tests
